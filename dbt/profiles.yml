api_ingestion_dbt:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: api-ingestion-pipeline
      dataset: api_stg
      location: US
      threads: 4
      keyfile: /opt/airflow/api-to-bigquery-ingestion-pipeline/credentials/api-ingestion-sa-key.json
      job_execution_timeout_seconds: 300
      job_retries: 1
      priority: interactive